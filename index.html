<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUB² BEAT · Luis Beltza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: #0a0806;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  overflow: hidden;
}

/* ── MESA / SUPERFICIE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 60%,
      #2a2018 0%,
      #140e0a 70%,
      #0a0806 100%);
  z-index: 0;
}

/* ── CONTENEDOR LIBRO ── */
.book-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;

  /* 3:2 landscape por defecto (desktop) */
  width:  min(92vw, 92vh * 1.5);
  height: min(92vh, 92vw / 1.5);
  max-width: 900px;
  max-height: 600px;
}

/* ── SOMBRA DEL LIBRO ── */
.book-wrap::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 4%;
  right: 4%;
  height: 35px;
  background: radial-gradient(ellipse, rgba(0,0,0,.7) 0%, transparent 70%);
  filter: blur(10px);
  z-index: -1;
}

/* ── EL LIBRO (flex row: spine + cover + pages) ── */
.book {
  display: flex;
  width: 100%;
  height: 100%;
  border-radius: 1px 3px 3px 1px;
  overflow: visible;
  filter: drop-shadow(6px 8px 28px rgba(0,0,0,.7));
}

/* ── SPINE ── */
.spine {
  width: 8%;
  min-width: 40px;
  max-width: 70px;
  flex-shrink: 0;
  background:
    linear-gradient(
      90deg,
      #1a120c 0%,
      #2e1f14 30%,
      #1e1409 70%,
      #120d08 100%
    );
  position: relative;
  border-radius: 1px 0 0 1px;
  overflow: hidden;
}

/* Texture overlay en el spine */
.spine::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('https://live.staticflickr.com/65535/55211066947_ae0b388681_h.jpg');
  background-size: cover;
  opacity: .12;
  mix-blend-mode: multiply;
}

/* Título vertical en el spine */
.spine-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-90deg);
  white-space: nowrap;
  font-family: 'Special Elite', monospace;
  font-size: clamp(.55rem, 1.8vw, .9rem);
  letter-spacing: .25em;
  color: rgba(220,205,185,.95);
  pointer-events: none;
}

/* Línea decorativa top/bottom del spine */
.spine::after {
  content: '';
  position: absolute;
  left: 20%;
  right: 20%;
  height: 1px;
  top: 8%;
  background: rgba(180,150,100,.2);
  box-shadow: 0 0 0 0 transparent, 0 calc(84vh) 0 rgba(180,150,100,.2);
}

/* ── COVER FRONT ── */
.cover {
  flex: 1;
  position: relative;
  background-image: url('https://live.staticflickr.com/65535/55211066947_ae0b388681_h.jpg');
  background-size: cover;
  background-position: center;
  overflow: hidden;
  border-radius: 0 2px 2px 0;
}

/* Veladura de papel sobre la textura */
.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(218,205,185,.22);
  z-index: 1;
}

/* Vignette interior */
.cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      ellipse at 50% 50%,
      transparent 45%,
      rgba(30,20,12,.22) 100%
    );
  z-index: 2;
  pointer-events: none;
}

/* ── CONTENIDO DE LA PORTADA ── */
.cover-content {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: clamp(.8rem, 3%, 1.8rem);
}

/* Cabecera */
.cover-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.cover-label {
  font-family: 'Special Elite', monospace;
  font-size: clamp(1.1rem, 3.6vw, 1.7rem);
  letter-spacing: .18em;
  color: rgba(42,32,24,.6);
  line-height: 2;
}

/* Título central */
.cover-center {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: clamp(.3rem, 1.5%, .7rem);
}

.cover-title {
  font-family: 'Special Elite', monospace;
  font-size: clamp(3.5rem, 14vw, 9rem);
  line-height: .9;
  letter-spacing: .04em;
  color: rgba(30,20,12,.82);
  text-shadow: 1px 1px 0 rgba(255,255,255,.15);
}

.cover-title .sq {
  font-size: .75em;
  vertical-align: super;
  color: #8b1a1a;
}

.cover-rule {
  width: clamp(2rem, 15%, 4rem);
  height: 1px;
  background: rgba(42,32,24,.3);
}

.cover-subtitle {
  font-family: 'Special Elite', monospace;
  font-size: clamp(.38rem, 1.3vw, .6rem);
  letter-spacing: .22em;
  color: rgba(42,32,24,.80);
  line-height: 1.6;
}

/* Firma pie */
.cover-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.cover-sig {
  font-family: 'Caveat', cursive;
  font-size: clamp(.8rem, 3vw, 1.5rem);
  color: #fff;
  line-height: 1;
}

.cover-year {
  font-family: 'Special Elite', monospace;
  font-size: clamp(.38rem, 1.2vw, .55rem);
  letter-spacing: .25em;
  color: rgba(42,32,24,.3);
}

/* ── CANTOS DE PÁGINAS ── */
.pages-edge {
  width: 2%;
  min-width: 8px;
  max-width: 16px;
  flex-shrink: 0;
  background:
    repeating-linear-gradient(
      to bottom,
      #e8e0d0 0px,
      #e8e0d0 1.5px,
      #d4caba 1.5px,
      #d4caba 2px
    );
  border-radius: 0 2px 2px 0;
  box-shadow: inset -2px 0 5px rgba(0,0,0,.08);
  overflow: hidden;
}

/* ── MOBILE: 2:3 VERTICAL ── */
@media (orientation: portrait), (max-width: 600px) {
  .book-wrap {
    width:  min(92vw, 92vh * 0.667);
    height: min(92vh, 92vw * 1.5);
    max-width: 400px;
    max-height: 600px;
  }
}


/* ── TRIPTYCH ── */
html, body {
  width: 100%;
  height: 100%;
  background: #0a0806;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  overflow: hidden;
}

.wing {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wing-inner {
  position: relative;
  width: 100%;
  height: 90vh;
  max-height: 620px;
  background-image: url('https://live.staticflickr.com/65535/55211066947_ae0b388681_h.jpg');
  background-size: cover;
  background-position: center;
  box-shadow: 4px 6px 28px rgba(0,0,0,.65);
}

.wing-label {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  padding: clamp(1.8rem, 6%, 3.2rem) 8%;
  font-family: 'Special Elite', monospace;
  font-size: clamp(1.1rem, 3.6vw, 1.7rem);
  letter-spacing: .18em;
  color: #8b1a1a;
  text-align: center;
}

.gap {
  width: 10px;
  flex-shrink: 0;
  background: #0a0806;
}

.center {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Override book-wrap to not have its own sizing fighting the triptych */
.book-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  /* 3:2 based on viewport height */
  height: 90vh;
  width: calc(90vh * 1.5);
  max-height: 620px;
  max-width: 930px;
}

@media (orientation: portrait), (max-width: 600px) {
  .book-wrap {
    height: 60vw;
    width: 90vw;
    max-width: none;
  }
}
</style>
</head>
<body>

<div class="gap"></div>
<div class="wing"><div class="wing-inner">
  <div class="wing-label">TEMAS</div>
</div></div>
<div class="gap"></div>
<div class="center">
  <div class="book-wrap">
    <div class="book">

    <!-- SPINE -->
    <div class="spine">
      <span class="spine-text">DUB<span style="font-size:1.4em;vertical-align:super;color:#c44;">²</span> BEAT · LUIS BELTZA</span>
    </div>

    <!-- COVER -->
    <div class="cover">
      <div class="cover-content">

        <div class="cover-header">
          <svg id="nav-line" width="100%" height="auto" viewBox="0 0 1000 60" preserveAspectRatio="none" style="display:block; overflow:visible;">
            <style>
              .nav-link { fill:rgba(42,32,24,.90); text-decoration:none; cursor:pointer; }
              .nav-link:hover { fill:rgba(120,60,30,1); }

            </style>
            <text y="44" font-family="Special Elite, monospace" font-size="48" textLength="1000" lengthAdjust="spacingAndGlyphs">
              <a href="https://beltzarecords.com" target="_blank"><tspan class="nav-link">BELTZARECORDS.COM</tspan></a>

              <tspan class="nav-sep"> · </tspan>
              <a href="https://beltzaexperience.github.io/magic-bus/" target="_blank"><tspan class="nav-link">MAGIC BUS</tspan></a>
              <tspan class="nav-sep"> · </tspan>
              <a href="https://beltzaexperience.github.io/UR-SAPIENS/" target="_blank"><tspan class="nav-link">UR_BOOK</tspan></a>

          </svg>

        <div class="cover-center">
          <div class="cover-title">DUB<span class="sq">²</span><br>BEAT</div>

        <svg width="100%" height="auto" viewBox="0 0 1000 55" preserveAspectRatio="none" style="display:block;">
          <text x="0" y="40"
            font-family="Special Elite, monospace"

            fill="rgba(42,32,24,.90)"
            textLength="1000"
            lengthAdjust="spacingAndGlyphs">"la fotografía callejera no deja de ser el más crítico y desgarrado de los autorretratos."</text>
        </svg>

        </div>

        <div class="cover-footer">
          <div style="flex:1;"></div>

        </div>

      </div>
    </div><!-- /cover -->

    <!-- CANTOS DE PÁGINAS -->
    <div class="pages-edge"></div>

  </div><!-- /book -->
  </div>
</div>
<div class="gap"></div>
<div class="wing"><div class="wing-inner">
  <div class="wing-label">ÍNDICE</div>
</div></div>
<div class="gap"></div>

</body>
</html>
